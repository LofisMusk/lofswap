name: Deploy Node

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/main.yml
      - Cargo.toml
      - Cargo.lock
      - blockchain-core/**
      - node-cli/**
      - explorer-api/**

permissions:
  contents: read

concurrency:
  group: deploy-node-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Node Changes
    runs-on: ubuntu-24.04
    outputs:
      node_cli: ${{ steps.filter.outputs.node_cli }}
      explorer_api: ${{ steps.filter.outputs.explorer_api }}
      any: ${{ steps.collect.outputs.any }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            node_cli:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'blockchain-core/**'
              - 'node-cli/**'
            explorer_api:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'explorer-api/**'

      - name: Summarize changes
        id: collect
        shell: bash
        run: |
          if [[ "${{ steps.filter.outputs.node_cli }}" == "true" || "${{ steps.filter.outputs.explorer_api }}" == "true" ]]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi

  build-node-cli:
    name: Build node-cli
    needs: detect-changes
    if: needs.detect-changes.outputs.node_cli == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: deploy-node-linux-amd64

      - name: Build node-cli
        run: cargo build --release -p node-cli

      - name: Prepare node-cli artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/node-cli
          cp target/release/node-cli dist/node-cli/node-cli

      - name: Upload node-cli artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-cli-binary
          path: dist/node-cli/node-cli
          if-no-files-found: error
          retention-days: 1

  build-explorer-api:
    name: Build explorer-api
    needs: detect-changes
    if: needs.detect-changes.outputs.explorer_api == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: deploy-explorer-api-linux-amd64

      - name: Build explorer-api
        run: cargo build --release -p explorer-api

      - name: Prepare explorer-api artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/explorer-api
          cp target/release/explorer-api dist/explorer-api/explorer-api

      - name: Upload explorer-api artifact
        uses: actions/upload-artifact@v4
        with:
          name: explorer-api-binary
          path: dist/explorer-api/explorer-api
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy Node Services
    needs:
      - detect-changes
      - build-node-cli
      - build-explorer-api
    if: >
      needs.detect-changes.outputs.any == 'true' &&
      (needs.build-node-cli.result == 'success' || needs.build-node-cli.result == 'skipped') &&
      (needs.build-explorer-api.result == 'success' || needs.build-explorer-api.result == 'skipped')
    runs-on: ubuntu-24.04
    env:
      NODE_CLI_CHANGED: ${{ needs.detect-changes.outputs.node_cli }}
      EXPLORER_API_CHANGED: ${{ needs.detect-changes.outputs.explorer_api }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOST1: ${{ secrets.SSH_HOST1 }}
      SSH_HOST2: ${{ secrets.SSH_HOST2 }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Download node-cli artifact
        if: env.NODE_CLI_CHANGED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: node-cli-binary
          path: dist/node-cli

      - name: Download explorer-api artifact
        if: env.EXPLORER_API_CHANGED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: explorer-api-binary
          path: dist/explorer-api

      - name: Setup SSH key and known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          : > ~/.ssh/known_hosts
          for host in "${SSH_HOST1}" "${SSH_HOST2}"; do
            if [[ -n "${host}" ]]; then
              ssh-keyscan -H "${host}" >> ~/.ssh/known_hosts 2>/dev/null || true
            fi
          done
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy changed services
        shell: bash
        run: |
          set -euo pipefail

          ssh_common=(-i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=15)
          hosts=()

          if [[ -n "${SSH_HOST1}" ]]; then
            hosts+=("${SSH_HOST1}")
          fi

          if [[ -n "${SSH_HOST2}" ]]; then
            hosts+=("${SSH_HOST2}")
          fi

          if [[ ${#hosts[@]} -eq 0 ]]; then
            echo "No SSH hosts configured."
            exit 1
          fi

          for host in "${hosts[@]}"; do
            echo "Deploying to ${host}"

            ssh "${ssh_common[@]}" "${SSH_USER}@${host}" "mkdir -p '${DEPLOY_PATH}' '${DEPLOY_PATH}/explorer-api'"

            if [[ "${NODE_CLI_CHANGED}" == "true" ]]; then
              scp "${ssh_common[@]}" dist/node-cli/node-cli "${SSH_USER}@${host}:/tmp/node-cli"
              ssh "${ssh_common[@]}" "${SSH_USER}@${host}" "\
                install -m 755 /tmp/node-cli '${DEPLOY_PATH}/node-cli' && \
                rm -f /tmp/node-cli && \
                sudo systemctl restart node-cli"
            fi

            if [[ "${EXPLORER_API_CHANGED}" == "true" ]]; then
              scp "${ssh_common[@]}" dist/explorer-api/explorer-api "${SSH_USER}@${host}:/tmp/explorer-api"
              ssh "${ssh_common[@]}" "${SSH_USER}@${host}" "\
                install -m 755 /tmp/explorer-api '${DEPLOY_PATH}/explorer-api/explorer-api' && \
                rm -f /tmp/explorer-api && \
                sudo systemctl restart explorer-api"
            fi

            ssh "${ssh_common[@]}" "${SSH_USER}@${host}" "\
              sudo systemctl status node-cli --no-pager || true; \
              sudo systemctl status explorer-api --no-pager || true"
          done
