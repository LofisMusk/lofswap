name: Release Builds

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release-builds.yml
      - Cargo.toml
      - Cargo.lock
      - blockchain-core/**
      - node-cli/**
      - wallet-cli/**
      - wallet-gui/**
      - lofswap-logo.png

permissions:
  contents: read

concurrency:
  group: release-builds-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Release Targets
    runs-on: ubuntu-24.04
    outputs:
      node_cli: ${{ steps.filter.outputs.node_cli }}
      wallet_cli: ${{ steps.filter.outputs.wallet_cli }}
      wallet_gui: ${{ steps.filter.outputs.wallet_gui }}
      any: ${{ steps.matrix.outputs.any }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            node_cli:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'blockchain-core/**'
              - 'node-cli/**'
            wallet_cli:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'blockchain-core/**'
              - 'wallet-cli/**'
            wallet_gui:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'blockchain-core/**'
              - 'wallet-gui/**'
              - 'lofswap-logo.png'

      - name: Build release matrix
        id: matrix
        shell: bash
        run: |
          export NODE_CLI_CHANGED="${{ steps.filter.outputs.node_cli }}"
          export WALLET_CLI_CHANGED="${{ steps.filter.outputs.wallet_cli }}"
          export WALLET_GUI_CHANGED="${{ steps.filter.outputs.wallet_gui }}"

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          changed = {
              "node-cli": os.environ["NODE_CLI_CHANGED"] == "true",
              "wallet-cli": os.environ["WALLET_CLI_CHANGED"] == "true",
              "wallet-gui": os.environ["WALLET_GUI_CHANGED"] == "true",
          }

          components = {
              "node-cli": {
                  "cargo_package": "node-cli",
                  "binary_name": "node-cli",
                  "asset_prefix": "lofswap-node",
              },
              "wallet-cli": {
                  "cargo_package": "wallet-cli",
                  "binary_name": "wallet-cli",
                  "asset_prefix": "lofswap-wallet-cli",
              },
              "wallet-gui": {
                  "cargo_package": "wallet-gui",
                  "binary_name": "wallet-gui",
                  "asset_prefix": "lofswap-wallet-gui",
              },
          }

          platforms = [
              {
                  "runner": "ubuntu-24.04",
                  "os_label": "linux",
                  "arch": "amd64",
                  "target": "x86_64-unknown-linux-gnu",
                  "exe_suffix": "",
              },
              {
                  "runner": "ubuntu-24.04-arm",
                  "os_label": "linux",
                  "arch": "arm64",
                  "target": "aarch64-unknown-linux-gnu",
                  "exe_suffix": "",
              },
              {
                  "runner": "macos-15-intel",
                  "os_label": "macos",
                  "arch": "amd64",
                  "target": "x86_64-apple-darwin",
                  "exe_suffix": "",
              },
              {
                  "runner": "macos-15",
                  "os_label": "macos",
                  "arch": "arm64",
                  "target": "aarch64-apple-darwin",
                  "exe_suffix": "",
              },
              {
                  "runner": "windows-latest",
                  "os_label": "windows",
                  "arch": "amd64",
                  "target": "x86_64-pc-windows-msvc",
                  "exe_suffix": ".exe",
              },
              {
                  "runner": "windows-11-arm",
                  "os_label": "windows",
                  "arch": "arm64",
                  "target": "aarch64-pc-windows-msvc",
                  "exe_suffix": ".exe",
              },
          ]

          include = []
          for component_name, component_cfg in components.items():
              if not changed[component_name]:
                  continue
              for platform in platforms:
                  include.append(
                      {
                          "component": component_name,
                          **component_cfg,
                          **platform,
                      }
                  )

          print(f"any={'true' if include else 'false'}")
          print(f"matrix={json.dumps({'include': include}, separators=(',', ':'))}")
          PY

  build-artifacts:
    name: Build ${{ matrix.asset_prefix }} ${{ matrix.os_label }} ${{ matrix.arch }}
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux GUI dependencies
        if: matrix.component == 'wallet-gui' && matrix.os_label == 'linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config

      - name: Setup Node.js
        if: matrix.component == 'wallet-gui'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wallet-gui/frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.component }}-${{ matrix.target }}

      - name: Build wallet-gui frontend
        if: matrix.component == 'wallet-gui'
        working-directory: wallet-gui/frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Build release binary
        run: cargo build --release -p ${{ matrix.cargo_package }} --target ${{ matrix.target }}

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail

          asset_base="${{ matrix.asset_prefix }}-${{ matrix.os_label }}-${{ matrix.arch }}"
          package_root="${RUNNER_TEMP}/release-package"
          package_dir="${package_root}/${asset_base}"
          archive_path="${RUNNER_TEMP}/${asset_base}.tar.gz"
          binary_path="target/${{ matrix.target }}/release/${{ matrix.binary_name }}${{ matrix.exe_suffix }}"
          packaged_binary="${package_dir}/${asset_base}${{ matrix.exe_suffix }}"

          mkdir -p "${package_dir}"
          cp "${binary_path}" "${packaged_binary}"

          if [[ "${{ matrix.component }}" == "wallet-gui" ]]; then
            cp -R wallet-gui/frontend/dist "${package_dir}/frontend-dist"

            if [[ "${{ matrix.os_label }}" == "windows" ]]; then
              cat > "${package_dir}/start-lofswap-wallet-gui.cmd" <<EOF
          @echo off
          setlocal
          set "SCRIPT_DIR=%~dp0"
          set "GUI_APP_DIST_DIR=%SCRIPT_DIR%frontend-dist"
          "%SCRIPT_DIR%${asset_base}${{ matrix.exe_suffix }}" %*
          EOF
            else
              launcher_name="start-lofswap-wallet-gui.sh"
              if [[ "${{ matrix.os_label }}" == "macos" ]]; then
                launcher_name="start-lofswap-wallet-gui.command"
              fi

              cat > "${package_dir}/${launcher_name}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="\$(cd "\$(dirname "\${BASH_SOURCE[0]}")" && pwd)"
          export GUI_APP_DIST_DIR="\${SCRIPT_DIR}/frontend-dist"
          exec "\${SCRIPT_DIR}/${asset_base}${{ matrix.exe_suffix }}" "\$@"
          EOF
              chmod +x "${package_dir}/${launcher_name}"
            fi
          fi
          tar -czf "${archive_path}" -C "${package_root}" "${asset_base}"
          echo "archive_path=${archive_path}" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_prefix }}-${{ matrix.os_label }}-${{ matrix.arch }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs:
      - detect-changes
      - build-artifacts
    if: needs.detect-changes.outputs.any == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "tag=build-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_name=Automated build ${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          files: release-assets/*
