<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lofswap Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060205; --surface: #0e0509; --surface-2: #0a0408;
      --border: #2d0d18; --border-2: #4a1428;
      --text: #f0e4ea; --muted: #6b4a58;
      --accent: #c0004e; --accent-dim: rgba(192,0,78,0.12); --accent-glow: rgba(192,0,78,0.35);
      --amber: #f5a623; --amber-dim: rgba(245,166,35,0.1);
      --danger: #ff5555; --danger-dim: rgba(255,85,85,0.1);
      --blue: #e0954a; --blue-dim: rgba(224,149,74,0.12);
      --purple: #d4608a; --purple-dim: rgba(212,96,138,0.12);
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --sans: 'Space Mono', ui-monospace, monospace;
      --r: 8px; --rl: 12px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(60,5,20,.6) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;top:0;left:0;right:0;height:300px;background:radial-gradient(ellipse 70% 45% at 50% 0%,rgba(192,0,78,.07),transparent);pointer-events:none;z-index:0}
    #app{position:relative;z-index:1}
    .topbar{position:sticky;top:0;z-index:200;height:58px;background:rgba(7,8,13,.9);backdrop-filter:blur(16px) saturate(1.3);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:14px}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
    .brand-orb{width:32px;height:32px;border-radius:50%;flex-shrink:0;object-fit:cover;filter:drop-shadow(0 0 8px var(--accent-glow))}
    .brand-name{font-size:14px;font-weight:800;color:var(--text);letter-spacing:.3px;line-height:1.2}
    .brand-sub{font-size:9px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:1.2px}
    .search-row{flex:1;max-width:580px;display:flex;gap:6px}
    .search-input{flex:1;height:36px;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:0 14px;color:var(--text);font-size:12.5px;font-family:var(--mono);outline:none;transition:border-color .15s,box-shadow .15s}
    .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(192,0,78,.08)}
    .search-input::placeholder{color:var(--muted);font-family:var(--sans);font-size:12.5px}
    .search-go{height:36px;padding:0 16px;flex-shrink:0;background:var(--accent-dim);border:1px solid rgba(192,0,78,.32);border-radius:var(--r);color:var(--accent);font-size:12px;font-weight:700;font-family:var(--sans);cursor:pointer;transition:all .15s;white-space:nowrap}
    .search-go:hover{background:rgba(192,0,78,.2)}
    .search-go:disabled{opacity:.5;cursor:default}
    .topbar-right{margin-left:auto;display:flex;align-items:center;flex-shrink:0}
    .s-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:10.5px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.8px;border:1px solid var(--border);color:var(--muted);transition:all .3s}
    .s-chip.ok{color:var(--accent);border-color:rgba(192,0,78,.28);background:var(--accent-dim)}
    .s-chip.err{color:var(--danger);border-color:rgba(255,85,85,.22);background:var(--danger-dim)}
    .s-led{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
    .s-chip.ok .s-led{animation:blink 2.5s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
    .container{max-width:1320px;margin:0 auto;padding:24px 20px 52px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    @media(max-width:900px){.stats{grid-template-columns:1fr 1fr}}
    @media(max-width:480px){.stats{grid-template-columns:1fr}}
    .sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;position:relative;overflow:hidden}
    .sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--bc,var(--accent));opacity:.65}
    .sc-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-family:var(--mono);margin-bottom:8px}
    .sc-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:5px}
    .sc-sub{font-size:11px;color:var(--muted);font-family:var(--mono);word-break:break-all}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
    .card-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);gap:10px}
    .card-ttl{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.2px}
    .ci{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
    table{width:100%;border-collapse:collapse}
    th{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-family:var(--mono);padding:9px 18px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:9px 18px;font-size:13px;vertical-align:middle;border-bottom:1px solid rgba(60,5,20,.7)}
    tr:last-child td{border-bottom:none}
    tbody tr{transition:background .1s}
    tbody tr:hover{background:rgba(192,0,78,.025)}
    .mono{font-family:var(--mono);font-size:12px}
    .muted{color:var(--muted)}
    .sm{font-size:11px}
    .lnk-b{font-family:var(--mono);font-size:12px;color:var(--accent);cursor:pointer}
    .lnk-b:hover{text-decoration:underline;opacity:.8}
    .lnk-t{font-family:var(--mono);font-size:12px;color:var(--blue);cursor:pointer}
    .lnk-t:hover{text-decoration:underline;opacity:.8}
    .bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:700;font-family:var(--mono);letter-spacing:.3px}
    .g{background:var(--accent-dim);color:var(--accent)}
    .b{background:var(--blue-dim);color:var(--blue)}
    .a{background:var(--amber-dim);color:var(--amber)}
    .r{background:var(--danger-dim);color:var(--danger)}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .mt{margin-top:14px}
    @media(max-width:820px){.g2{grid-template-columns:1fr}}
    .tbar{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:10px 18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:16px}
    .ti{display:flex;align-items:center;gap:7px}
    .tl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-family:var(--mono)}
    .tv{font-size:12px;font-weight:600;font-family:var(--mono)}
    .sp{width:1px;height:18px;background:var(--border);flex-shrink:0}
    #loading{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .3s,visibility .3s}
    #loading.gone{opacity:0;visibility:hidden;pointer-events:none}
    .spin{width:34px;height:34px;border:2.5px solid var(--border-2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-txt{font-size:12px;color:var(--muted);font-family:var(--mono)}
    .bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:14px}
    .bc a{color:var(--accent);text-decoration:none}
    .bc a:hover{text-decoration:underline}
    .dhero{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;margin-bottom:14px}
    .dtype{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-family:var(--mono);margin-bottom:4px}
    .dtitle{font-size:22px;font-weight:800;line-height:1.2;margin-bottom:6px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .dfullhash{font-family:var(--mono);font-size:12px;color:var(--muted);word-break:break-all;line-height:1.5;border-top:1px solid var(--border);padding-top:10px;margin-top:10px}
    .fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;margin-top:18px}
    .fld{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px}
    .flbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-family:var(--mono);margin-bottom:5px}
    .fval{font-size:14px;font-weight:700;word-break:break-all}
    .fval.mono{font-size:11.5px;font-weight:400}
    .fval.green{color:var(--accent)}
    .fval.blue{color:var(--blue)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border-2);color:var(--muted);background:transparent;text-decoration:none;transition:all .15s;font-family:var(--sans)}
    .btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
    .nf{text-align:center;padding:72px 20px}
    .nf-code{font-size:68px;font-weight:800;color:var(--border-2);font-family:var(--mono);line-height:1}
    .nf-msg{font-size:15px;color:var(--muted);margin:14px 0 28px}
    .empty{padding:28px 20px;text-align:center;font-size:12px;color:var(--muted);font-family:var(--mono)}
    @keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fu .35s ease both}
    .d1{animation-delay:.04s}.d2{animation-delay:.09s}.d3{animation-delay:.14s}.d4{animation-delay:.19s}

    .gh-link{display:inline-flex;align-items:center;color:var(--muted);text-decoration:none;transition:color .2s}
    .gh-link:hover{color:var(--accent)}

    @media(max-width:600px){.container{padding:14px 14px 40px}.topbar{padding:0 12px}.dtitle{font-size:18px}}
  </style>
</head>

<script>
const $=id=>document.getElementById(id);
const shorten=(s,n=14)=>s?(s.length>n?s.slice(0,Math.ceil(n*.65))+'…'+s.slice(-4):s):'—';
const fmtTs=ts=>{
  if(ts==null||ts===''||ts==='-')return'—';
  const n=Number(ts);
  const d=!isNaN(n)?new Date(n<2e10?n*1000:n):new Date(ts);
  if(isNaN(d.getTime()))return String(ts);
  return d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
};
const mk=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;};
const openBlock=h=>window.open('/block/'+encodeURIComponent(h),'_blank');
const openTx=t=>window.open('/tx/'+encodeURIComponent(t),'_blank');
const fto=async(url,ms=5000)=>{const c=new AbortController();const id=setTimeout(()=>c.abort(),ms);try{return await fetch(url,{signal:c.signal});}finally{clearTimeout(id);}};
const get=async(path,fb=null)=>{try{const r=await fto(path);if(!r.ok)return fb;return await r.json();}catch{return fb;}};
const probe=async()=>{try{const r=await fto('/health',3000);return r&&r.ok;}catch{return false;}};
const ldr=$('loading');let ldrDone=false;
const hideLoader=()=>{if(ldrDone)return;ldrDone=true;ldr.classList.add('gone');setTimeout(()=>ldr.remove(),400);};
const setStatus=ok=>{$('chip').className='s-chip '+(ok?'ok':'err');$('chipTxt').textContent=ok?'Online':'Offline';};
const route=()=>{
  const segs=window.location.pathname.replace(/^\/+/,'').split('/');
  if(!segs[0])return{v:'home'};
  if(segs[0]==='block'&&segs[1])return{v:'block',id:decodeURIComponent(segs[1])};
  if(segs[0]==='tx'&&segs[1])return{v:'tx',id:decodeURIComponent(segs[1])};
  if(/^\d+$/.test(segs[0]))return{v:'block',id:segs[0]};
  if(segs[0])return{v:'block',id:segs[0]};
  return{v:'home'};
};
const doSearch=async()=>{
  const q=$('si').value.trim();if(!q)return;
  const btn=$('sb');btn.textContent='…';btn.disabled=true;
  try{
    if(/^\d+$/.test(q)){location.href='/block/'+encodeURIComponent(q);return;}
    if(/^[0-9a-fA-F]{8,}$/.test(q)){
      if(await get('/api/block/'+encodeURIComponent(q))){location.href='/block/'+encodeURIComponent(q);return;}
      if(await get('/api/tx/'+encodeURIComponent(q))){location.href='/tx/'+encodeURIComponent(q);return;}
    }
    if(await get('/api/tx/'+encodeURIComponent(q))){location.href='/tx/'+encodeURIComponent(q);return;}
    page404(q);
  }finally{btn.textContent='Search';btn.disabled=false;}
};
const page404=q=>{
  const root=$('pr');root.innerHTML='';
  const w=mk('div','container');
  w.innerHTML=`<div class="nf fu"><div class="nf-code">404</div><div class="nf-msg">Nothing found for <span class="mono" style="color:var(--text)">${q}</span></div><a href="/" class="btn">← Back to Explorer</a></div>`;
  root.appendChild(w);hideLoader();
};
const pageHome=async()=>{
  const root=$('pr');root.innerHTML='';
  const w=mk('div','container');
  w.innerHTML=`
  <div class="stats">
    <div class="sc fu d1" style="--bc:var(--accent)"><div class="sc-label">Block Height</div><div class="sc-val" id="hH">—</div><div class="sc-sub mono" id="hHash">—</div></div>
    <div class="sc fu d2" style="--bc:var(--blue)"><div class="sc-label">Peers Online</div><div class="sc-val" id="hP">—</div><div class="sc-sub" id="hPT">— total peers</div></div>
    <div class="sc fu d3" style="--bc:var(--amber)"><div class="sc-label">Mempool</div><div class="sc-val" id="hM">—</div><div class="sc-sub">Pending transactions</div></div>
    <div class="sc fu d4" style="--bc:var(--purple)"><div class="sc-label">Latest TX</div><div class="sc-val" id="hTx">—</div><div class="sc-sub" id="hTxS">—</div></div>
  </div>
  <div class="tbar fu" id="tbar" style="display:none">
    <div class="ti"><span class="tl">Consensus</span><span class="tv" id="tCons">—</span></div>
    <div class="sp"></div>
    <div class="ti"><span class="tl">Peer checks</span><span class="tv" id="tPC">—</span></div>
    <div class="sp"></div>
    <div class="ti"><span class="tl">Chain OK</span><span class="tv" id="tCK">—</span></div>
    <div class="sp"></div>
    <div class="ti"><span class="tv muted sm" id="tEx" style="font-size:10px"></span></div>
  </div>
  <div class="g2 fu d2">
    <div class="card">
      <div class="card-hdr">
        <div class="card-ttl"><div class="ci" style="background:var(--accent-dim);color:var(--accent)">⬡</div>Latest Blocks</div>
        <span class="muted mono sm" id="hLbl">—</span>
      </div>
      <table><thead><tr><th>Height</th><th>Hash</th><th>TXs</th><th>Time</th></tr></thead><tbody id="bBody"></tbody></table>
    </div>
    <div class="card">
      <div class="card-hdr">
        <div class="card-ttl"><div class="ci" style="background:var(--blue-dim);color:var(--blue)">↔</div>Recent Transactions</div>
      </div>
      <table><thead><tr><th>TXID</th><th>From</th><th>To</th><th>Amount</th></tr></thead><tbody id="tBody"></tbody></table>
    </div>
  </div>
  <div class="g2 mt fu d3">
    <div class="card">
      <div class="card-hdr">
        <div class="card-ttl"><div class="ci" style="background:var(--amber-dim);color:var(--amber)">⏳</div>Mempool</div>
        <span class="bdg a" id="mCnt">0</span>
      </div>
      <table><thead><tr><th>From</th><th>To</th><th>Amount</th></tr></thead><tbody id="mBody"></tbody></table>
    </div>
    <div class="card">
      <div class="card-hdr">
        <div class="card-ttl"><div class="ci" style="background:var(--blue-dim);color:var(--blue)">◉</div>Peers</div>
        <button class="btn" id="rfBtn" style="padding:4px 10px;font-size:11px">↺ Refresh</button>
      </div>
      <table><thead><tr><th>Address</th><th>Status</th><th>RTT</th><th>Last Seen</th></tr></thead><tbody id="pBody"></tbody></table>
    </div>
  </div>`;
  root.appendChild(w);hideLoader();
  await loadHome();
  $('rfBtn').onclick=loadHome;
};
const loadHome=async()=>{
  try{
    const[h,chain]=await Promise.all([get('/height',{height:0}),get('/chain',[])]);
    const height=h?.height||chain?.length||0;
    $('hH').textContent=height||'—';$('hLbl').textContent='Height '+height;
    const lb=chain?.length?chain[chain.length-1]:null;
    $('hHash').textContent=lb?shorten(lb.hash,24):'—';
    const bb=$('bBody');bb.innerHTML='';
    (chain||[]).slice(-20).reverse().forEach(b=>{
      const h2=b.hash||'';const tr=mk('tr');
      tr.innerHTML=`<td><span class="bdg g">#${b.index}</span></td><td><span class="lnk-b" title="${h2}">${shorten(h2,24)}</span></td><td class="muted mono">${(b.transactions||[]).length}</td><td class="muted mono sm">${b.timestamp?fmtTs(b.timestamp):'—'}</td>`;
      tr.querySelector('.lnk-b').onclick=()=>openBlock(h2);bb.appendChild(tr);
    });
    if(!chain?.length)bb.innerHTML='<tr><td colspan="4"><div class="empty">No blocks yet</div></td></tr>';
    const[peers,pSt]=await Promise.all([get('/peers',[]),get('/peers/status',{list:[]})]);
    const pList=pSt?.list||(peers||[]).map(p=>({peer:p,online:false,status:'offline'}));
    const onCnt=pList.filter(p=>p.online).length;
    $('hP').textContent=onCnt+'/'+(peers?.length||0);$('hPT').textContent=(peers?.length||0)+' total peers';
    const pb=$('pBody');pb.innerHTML='';
    if(pList.length){
      pList.forEach(p=>{
        const lbl=p.status||(p.online?'online':'offline');
        const cls=lbl==='online'?'g':lbl==='syncing'?'a':'r';
        const tr=mk('tr');
        tr.innerHTML=`<td class="mono sm">${shorten(p.peer,26)}</td><td><span class="bdg ${cls}">${lbl}</span></td><td class="muted mono">${p.rtt_ms!=null?p.rtt_ms+'ms':'—'}</td><td class="muted mono sm">${p.last_seen!=null?fmtTs(p.last_seen):'—'}</td>`;
        pb.appendChild(tr);
      });
    }else{pb.innerHTML='<tr><td colspan="4"><div class="empty">No peers connected</div></td></tr>';}
    const mem=await get('/mempool',[]);
    $('hM').textContent=mem?.length??0;$('mCnt').textContent=mem?.length??0;
    const mb=$('mBody');mb.innerHTML='';
    if(mem?.length){
      mem.forEach(tx=>{const tr=mk('tr');tr.innerHTML=`<td class="mono sm">${shorten(tx.from||'(reward)',18)}</td><td class="mono sm">${shorten(tx.to||'—',18)}</td><td class="mono">${tx.amount??'—'}</td>`;mb.appendChild(tr);});
    }else{mb.innerHTML='<tr><td colspan="3"><div class="empty">Mempool is empty</div></td></tr>';}
    const ltx=await get('/chain/latest-tx',null);
    $('hTx').textContent=ltx?.amount??'—';
    $('hTxS').textContent=ltx?shorten(ltx.from||'(reward)',10)+' → '+shorten(ltx.to||'—',10):'—';
    const rr=await get('/api/transactions/recent',{transactions:[]});
    const txs=rr?.transactions||[];
    const tb=$('tBody');tb.innerHTML='';
    if(txs.length){
      txs.slice(0,20).forEach(tx=>{
        const tid=tx.txid||'';const tr=mk('tr');
        tr.innerHTML=`<td><span class="lnk-t" title="${tid}">${shorten(tid,18)}</span></td><td class="muted mono sm">${shorten(tx.from||'(reward)',16)}</td><td class="muted mono sm">${shorten(tx.to||'—',16)}</td><td class="mono">${tx.amount??'—'}</td>`;
        tr.querySelector('.lnk-t').onclick=()=>openTx(tid);tb.appendChild(tr);
      });
    }else{tb.innerHTML='<tr><td colspan="4"><div class="empty">No recent transactions</div></td></tr>';}
    const tl=await get('/telemetry',null);
    if(tl){
      $('tbar').style.display='flex';
      $('tCons').textContent='#'+(tl.consensus_height??'—')+' · '+shorten(tl.consensus_hash,14);
      $('tPC').textContent=(tl.ping_ok??0)+'/'+(tl.peers_sampled??0);
      $('tCK').textContent=tl.chain_ok??0;
      $('tEx').textContent=`total: ${tl.peers_total??0}  local: ${tl.height_local??0}  max: ${tl.height_max??0}`;
    }
    setStatus(true);
  }catch{setStatus(false);}
};
const pageBlock=async id=>{
  const root=$('pr');root.innerHTML='';
  const w=mk('div','container');
  w.innerHTML=`<div class="dhero fu"><div class="bc"><a href="/">Explorer</a><span>›</span><span>Block</span></div><div class="muted mono sm">Loading…</div></div>`;
  root.appendChild(w);hideLoader();
  let b=await get('/api/block/'+encodeURIComponent(id));
  if(!b&&/^\d+$/.test(id)){const chain=await get('/chain',[]);b=(chain||[]).find(x=>String(x.index)===id)||null;}
  if(!b){const chain=await get('/chain',[]);b=(chain||[]).find(x=>x.hash===id)||null;}
  if(!b){
    w.innerHTML=`<div class="nf fu"><div class="nf-code">404</div><div class="nf-msg">Block not found:<br><span class="mono sm" style="color:var(--text)">${id}</span></div><a href="/" class="btn">← Back to Explorer</a></div>`;
    setStatus(false);return;
  }
  const txs=b.transactions||[];
  w.innerHTML=`
  <div class="dhero fu">
    <div class="bc"><a href="/">Explorer</a><span>›</span><span>Block #${b.index}</span></div>
    <div class="dtype">Block</div>
    <div class="dtitle"><span class="bdg g" style="font-size:13px;padding:3px 10px">#${b.index}</span> Block Details</div>
    <div class="fgrid">
      <div class="fld"><div class="flbl">Height</div><div class="fval green">${b.index??'—'}</div></div>
      <div class="fld"><div class="flbl">Transactions</div><div class="fval">${txs.length}</div></div>
      <div class="fld"><div class="flbl">Difficulty</div><div class="fval">${b.difficulty??'—'}</div></div>
      <div class="fld"><div class="flbl">Nonce</div><div class="fval mono">${b.nonce??'—'}</div></div>
      <div class="fld" style="grid-column:span 2"><div class="flbl">Timestamp</div><div class="fval" style="font-size:13px">${fmtTs(b.timestamp)}</div></div>
      <div class="fld" style="grid-column:span 3"><div class="flbl">Miner</div><div class="fval mono">${b.miner||'—'}</div></div>
    </div>
    <div class="dfullhash"><span style="color:var(--muted)">Hash&nbsp;&nbsp;</span>${b.hash||'—'}</div>
  </div>
  <div class="card fu d2">
    <div class="card-hdr">
      <div class="card-ttl"><div class="ci" style="background:var(--blue-dim);color:var(--blue)">↔</div>Transactions<span class="bdg b" style="margin-left:4px">${txs.length}</span></div>
    </div>
    <table><thead><tr><th>TXID</th><th>From</th><th>To</th><th>Amount</th><th>Timestamp</th></tr></thead><tbody id="btb"></tbody></table>
  </div>`;
  const btb=w.querySelector('#btb');
  if(!txs.length){btb.innerHTML='<tr><td colspan="5"><div class="empty">No transactions in this block</div></td></tr>';}
  else{
    txs.forEach(tx=>{
      const tid=tx.txid||'';const tr=mk('tr');
      tr.innerHTML=`<td><span class="lnk-t" title="${tid}">${shorten(tid,20)}</span></td><td class="muted mono sm">${shorten(tx.from||'(reward)',22)}</td><td class="muted mono sm">${shorten(tx.to||'—',22)}</td><td class="mono">${tx.amount??'—'}</td><td class="muted mono sm">${tx.timestamp?fmtTs(tx.timestamp):'—'}</td>`;
      tr.querySelector('.lnk-t').onclick=()=>openTx(tid);btb.appendChild(tr);
    });
  }
  setStatus(true);
};
const pageTx=async txid=>{
  const root=$('pr');root.innerHTML='';
  const w=mk('div','container');
  w.innerHTML=`<div class="dhero fu"><div class="bc"><a href="/">Explorer</a><span>›</span><span>Transaction</span></div><div class="muted mono sm">Loading…</div></div>`;
  root.appendChild(w);hideLoader();
  const tx=await get('/api/tx/'+encodeURIComponent(txid));
  if(!tx){
    w.innerHTML=`<div class="nf fu"><div class="nf-code">404</div><div class="nf-msg">Transaction not found</div><div class="muted mono sm" style="margin-bottom:24px;word-break:break-all">${shorten(txid,48)}</div><a href="/" class="btn">← Back to Explorer</a></div>`;
    setStatus(false);return;
  }
  const bref=tx.blockHash?`#${tx.blockIndex??'—'} · ${shorten(tx.blockHash,16)}`:(tx.blockIndex!=null?'#'+tx.blockIndex:'—');
  const blink=tx.blockHash?`<span class="lnk-b" id="brl">${bref}</span>`:bref;
  w.innerHTML=`
  <div class="dhero fu">
    <div class="bc"><a href="/">Explorer</a><span>›</span><span>Transaction</span></div>
    <div class="dtype">Transaction</div>
    <div class="dtitle"><span class="bdg b" style="font-size:13px;padding:3px 10px">TX</span> Transaction Details</div>
    <div class="fgrid">
      <div class="fld"><div class="flbl">Amount</div><div class="fval green">${tx.amount??'—'}</div></div>
      <div class="fld"><div class="flbl">Block</div><div class="fval mono">${blink}</div></div>
      <div class="fld"><div class="flbl">Confirmations</div><div class="fval">${tx.confirmations??'—'}</div></div>
      <div class="fld"><div class="flbl">Confirming Nodes</div><div class="fval">${tx.confirmingNodes??'—'}</div></div>
      <div class="fld" style="grid-column:span 2"><div class="flbl">Timestamp</div><div class="fval" style="font-size:13px">${fmtTs(tx.timestamp)}</div></div>
    </div>
    <div class="dfullhash"><span style="color:var(--muted)">TXID&nbsp;</span>${txid}</div>
  </div>
  <div class="card fu d2 mt">
    <div class="card-hdr"><div class="card-ttl">Addresses</div></div>
    <div style="padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="fld"><div class="flbl">From</div><div class="fval mono" style="word-break:break-all;font-size:11px">${tx.from||'(reward)'}</div></div>
      <div class="fld"><div class="flbl">To</div><div class="fval mono" style="word-break:break-all;font-size:11px">${tx.to||'—'}</div></div>
    </div>
  </div>
  <div class="card fu d3 mt">
    <div class="card-hdr"><div class="card-ttl">Signature</div></div>
    <div style="padding:16px 18px"><div class="mono muted" style="font-size:11px;word-break:break-all;line-height:1.9">${tx.signature||'—'}</div></div>
  </div>`;
  const brl=w.querySelector('#brl');
  if(brl&&tx.blockHash)brl.onclick=()=>openBlock(tx.blockHash);
  setStatus(true);
};
(async()=>{
  $('sb').onclick=doSearch;
  $('si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
  probe().then(ok=>{if(!ok)setStatus(false);});
  const{v,id}=route();
  if(v==='block')await pageBlock(id);
  else if(v==='tx')await pageTx(id);
  else await pageHome();
})();
</script>
</body>
</html>
